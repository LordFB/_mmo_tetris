<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MMO TETRIS</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <!-- The entire screen is the CRT. EVERYTHING — boards, leaderboard, next,
         score panels AND the lobby (title, name/level fields, START button) —
         is drawn as NES pixel art onto #source, then this WebGL canvas displays
         it through the CRT shader, so the UI lives inside the tube. Hover, click
         and text entry are handled manually against the canvas (see app.js). -->
    <canvas id="game"></canvas>
    <!-- crisp low-res composite render target; only shown if WebGL is absent -->
    <canvas id="source"></canvas>

    <script type="module" src="/app.js"></script>
  </body>
</html>
